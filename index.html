  <!-- Fully functional Standalone Single-file React Application -->
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- Core Matchmaking Engine ---
    function generateMatchPool(playersList, groupName = 'ทั่วไป') {
      const activePlayers = playersList.filter(p => p.active);
      const n = activePlayers.length;
      if (n < 4) return [];

      const playerIds = activePlayers.map(p => p.id);
      const playCounts = {};
      playerIds.forEach(id => {
        playCounts[id] = 0;
      });

      const partnerCount = {};
      const opponentCount = {};
      playerIds.forEach(id1 => {
        partnerCount[id1] = {};
        opponentCount[id1] = {};
        playerIds.forEach(id2 => {
          partnerCount[id1][id2] = 0;
          opponentCount[id1][id2] = 0;
        });
      });

      const matchesResult = [];
      const maxGames = (n % 4 === 0) ? 5 : 4;
      const targetMatchCount = Math.floor((n * maxGames) / 4);

      for (let m = 0; m < targetMatchCount; m++) {
        const candidates = playerIds.filter(id => playCounts[id] < maxGames);
        if (candidates.length < 4) break;

        candidates.sort((a, b) => playCounts[a] - playCounts[b]);

        let bestCombo = null;
        let bestScore = Infinity;

        const searchLimit = Math.min(candidates.length, 16);
        const searchSubset = candidates.slice(0, searchLimit);

        for (let i = 0; i < searchSubset.length; i++) {
          const p1 = searchSubset[i];
          for (let j = i + 1; j < searchSubset.length; j++) {
            const p2 = searchSubset[j];
            for (let k = 0; k < searchSubset.length; k++) {
              if (k === i || k === j) continue;
              const o1 = searchSubset[k];
              for (let l = k + 1; l < searchSubset.length; l++) {
                if (l === i || l === j) continue;
                const o2 = searchSubset[l];

                const sumPlayCount = playCounts[p1] + playCounts[p2] + playCounts[o1] + playCounts[o2];
                const partnerPenalty = (partnerCount[p1][p2] + partnerCount[o1][o2]) * 1000;
                const opponentPenalty = (
                  opponentCount[p1][o1] +
                  opponentCount[p1][o2] +
                  opponentCount[p2][o1] +
                  opponentCount[p2][o2]
                ) * 10;

                const score = sumPlayCount + partnerPenalty + opponentPenalty;

                if (score < bestScore) {
                  bestScore = score;
                  bestCombo = [p1, p2, o1, o2];
                }
              }
            }
          }
        }

        if (!bestCombo) break;

        const [p1, p2, o1, o2] = bestCombo;

        playCounts[p1]++;
        playCounts[p2]++;
        playCounts[o1]++;
        playCounts[o2]++;

        partnerCount[p1][p2]++;
        partnerCount[p2][p1]++;
        partnerCount[o1][o2]++;
        partnerCount[o2][o1]++;

        opponentCount[p1][o1]++; opponentCount[o1][p1]++;
        opponentCount[p1][o2]++; opponentCount[o2][p1]++;
        opponentCount[p2][o1]++; opponentCount[o1][p2]++;
        opponentCount[p2][o2]++; opponentCount[o2][p2]++;

        matchesResult.push({
          id: 'match-gen-' + (m + 1) + '-' + Math.random().toString(36).substr(2, 5),
          group: groupName,
          courtId: null,
          courtName: null,
          round: m + 1,
          player1Id: p1,
          player2Id: p2,
          opponent1Id: o1,
          opponent2Id: o2,
          score1: null,
          score2: null,
          played: false,
          status: 'pending'
        });
      }

      return matchesResult;
    }

    function scheduleAvailableMatches(matchesList, courtsList, playersList) {
      const updatedMatches = [...matchesList];
      const activeCourts = courtsList.filter(c => c.isActive);

      // Find busy player IDs currently actively playing
      const busyPlayerIds = new Set();
      updatedMatches.forEach(m => {
        if (m.status === 'active') {
          busyPlayerIds.add(m.player1Id);
          busyPlayerIds.add(m.player2Id);
          busyPlayerIds.add(m.opponent1Id);
          busyPlayerIds.add(m.opponent2Id);
        }
      });

      // Find busy court IDs
      const busyCourtIds = new Set();
      updatedMatches.forEach(m => {
        if (m.status === 'active' && m.courtId) {
          busyCourtIds.add(m.courtId);
        }
      });

      const freeCourts = activeCourts.filter(c => !busyCourtIds.has(c.id));
      if (freeCourts.length === 0) return updatedMatches;

      const sortedScheduledMatches = [...updatedMatches]
        .filter(m => m.status === 'active' || m.status === 'completed')
        .sort((a, b) => (a.scheduledAt || 0) - (b.scheduledAt || 0));

      const getConsecutiveCount = (playerId) => {
        let run = 0;
        for (let i = sortedScheduledMatches.length - 1; i >= 0; i--) {
          const m = sortedScheduledMatches[i];
          const hasPlayer = [m.player1Id, m.player2Id, m.opponent1Id, m.opponent2Id].includes(playerId);
          if (hasPlayer) {
            run++;
          } else {
            break;
          }
        }
        return run;
      };

      const consecutivePlays = {};
      playersList.forEach(p => {
        consecutivePlays[p.id] = getConsecutiveCount(p.id);
      });

      for (const court of freeCourts) {
        let bestMatchIndex = -1;
        let minFatigueViolation = Infinity;

        for (let i = 0; i < updatedMatches.length; i++) {
          const m = updatedMatches[i];
          if (m.status !== 'pending') continue;

          const mPlayers = [m.player1Id, m.player2Id, m.opponent1Id, m.opponent2Id];
          
          // CRITICAL: Player must not be playing on another court simultaneously in the same round!
          const hasBusyConflict = mPlayers.some(pId => busyPlayerIds.has(pId));
          if (hasBusyConflict) continue;

          const fatigueViolations = mPlayers.filter(pId => consecutivePlays[pId] >= 2).length;

          if (fatigueViolations < minFatigueViolation) {
            minFatigueViolation = fatigueViolations;
            bestMatchIndex = i;
          }

          if (fatigueViolations === 0) {
            break;
          }
        }

        if (bestMatchIndex !== -1) {
          const selectedMatch = updatedMatches[bestMatchIndex];
          selectedMatch.status = 'active';
          selectedMatch.courtId = court.id;
          selectedMatch.courtName = court.name;
          selectedMatch.scheduledAt = Date.now();

          const mPlayers = [
            selectedMatch.player1Id,
            selectedMatch.player2Id,
            selectedMatch.opponent1Id,
            selectedMatch.opponent2Id
          ];
          mPlayers.forEach(pId => busyPlayerIds.add(pId));
        } else {
          break;
        }
      }

      return updatedMatches;
    }

    function getLeaderboard(playersList, matchesList) {
      const stats = {};
      playersList.forEach(p => {
        stats[p.id] = {
          gamesPlayed: 0,
          wins: 0,
          losses: 0,
          draws: 0,
          pointsScored: 0,
          pointsConceded: 0,
          pointDifferential: 0,
          winRatio: 0,
          streak: 0
        };
      });

      const playedMatches = matchesList
        .filter(m => m.played && m.score1 !== null && m.score2 !== null)
        .sort((a, b) => (a.completedAt || 0) - (b.completedAt || 0));

      const currentStreak = {};
      playersList.forEach(p => (currentStreak[p.id] = 0));

      playedMatches.forEach(m => {
        const s1 = Number(m.score1);
        const s2 = Number(m.score2);

        const team1 = [m.player1Id, m.player2Id];
        const team2 = [m.opponent1Id, m.opponent2Id];
        const allMatchPlayers = [...team1, ...team2];

        allMatchPlayers.forEach(pId => {
          if (stats[pId]) {
            stats[pId].gamesPlayed += 1;
          }
        });

        if (s1 > s2) {
          team1.forEach(pId => {
            if (stats[pId]) {
              stats[pId].wins += 1;
              stats[pId].pointsScored += s1;
              stats[pId].pointsConceded += s2;
              currentStreak[pId] = currentStreak[pId] >= 0 ? currentStreak[pId] + 1 : 1;
            }
          });
          team2.forEach(pId => {
            if (stats[pId]) {
              stats[pId].losses += 1;
              stats[pId].pointsScored += s2;
              stats[pId].pointsConceded += s1;
              currentStreak[pId] = currentStreak[pId] <= 0 ? currentStreak[pId] - 1 : -1;
            }
          });
        } else if (s2 > s1) {
          team2.forEach(pId => {
            if (stats[pId]) {
              stats[pId].wins += 1;
              stats[pId].pointsScored += s2;
              stats[pId].pointsConceded += s1;
              currentStreak[pId] = currentStreak[pId] >= 0 ? currentStreak[pId] + 1 : 1;
            }
          });
          team1.forEach(pId => {
            if (stats[pId]) {
              stats[pId].losses += 1;
              stats[pId].pointsScored += s1;
              stats[pId].pointsConceded += s2;
              currentStreak[pId] = currentStreak[pId] <= 0 ? currentStreak[pId] - 1 : -1;
            }
          });
        } else {
          allMatchPlayers.forEach(pId => {
            if (stats[pId]) {
              stats[pId].draws += 1;
              stats[pId].pointsScored += s1;
              stats[pId].pointsConceded += s2;
            }
          });
        }
      });

      return playersList.map(p => {
        const pStats = stats[p.id] || {
          gamesPlayed: 0,
          wins: 0,
          losses: 0,
          draws: 0,
          pointsScored: 0,
          pointsConceded: 0,
          pointDifferential: 0,
          winRatio: 0,
          streak: 0
        };

        const diff = pStats.pointsScored - pStats.pointsConceded;
        const ratio = pStats.gamesPlayed > 0 ? pStats.wins / pStats.gamesPlayed : 0;

        return {
          playerId: p.id,
          name: p.name,
          group: p.group || 'ทั่วไป',
          duprUrl: p.duprUrl || '',
          duprRating: p.duprRating,
          gamesPlayed: pStats.gamesPlayed,
          wins: pStats.wins,
          losses: pStats.losses,
          draws: pStats.draws,
          pointsScored: pStats.pointsScored,
          pointsConceded: pStats.pointsConceded,
          pointDifferential: diff,
          winRatio: ratio,
          streak: currentStreak[p.id] || 0
        };
      }).sort((a, b) => {
        if (b.wins !== a.wins) return b.wins - a.wins;
        if (b.pointDifferential !== a.pointDifferential) return b.pointDifferential - a.pointDifferential;
        return b.pointsScored - a.pointsScored;
      });
    }

    // --- Standalone App Root Component ---
    function App() {
      const [players, setPlayers] = useState(() => {
        const saved = localStorage.getItem('standalone_pb_players_v2');
        if (saved) return JSON.parse(saved);
        
        // Convert to single group if loaded from older structure
        const base = window.__INITIAL_PLAYERS__ || [];
        return base.map(p => ({ ...p, group: 'ทั่วไป' }));
      });

      const [matches, setMatches] = useState(() => {
        const saved = localStorage.getItem('standalone_pb_matches_v2');
        return saved ? JSON.parse(saved) : (window.__INITIAL_MATCHES__ || []);
      });

      const [courts, setCourts] = useState(() => {
        const saved = localStorage.getItem('standalone_pb_courts_v2');
        return saved ? JSON.parse(saved) : (window.__INITIAL_COURTS__ || [
          { id: 'c1', name: 'สนามคอร์ท 1', isActive: true },
          { id: 'c2', name: 'สนามคอร์ท 2', isActive: true },
          { id: 'c3', name: 'สนามคอร์ท 3', isActive: true }
        ]);
      });

      const [hasSavedData, setHasSavedData] = useState(() => {
        return !!localStorage.getItem('standalone_pb_players_v2');
      });

      const handleLoadInitialData = () => {
        if (confirm('ระบบจะเขียนทับประวัติแข่งขันและรายชื่อเดิมบนเฉพาะบราวเซอร์เครื่องนี้ ด้วยข้อมูลเริ่มต้นที่ติดเคียงมากับหน้าเว็บนี้ล่าสุด ต้องการล้างเพื่อนำเข้าใหม่ใช่หรือไม่?')) {
          localStorage.removeItem('standalone_pb_players_v2');
          localStorage.removeItem('standalone_pb_matches_v2');
          localStorage.removeItem('standalone_pb_courts_v2');
          window.location.reload();
        }
      };

      const [activeTab, setActiveTab] = useState('scheduler');
      const [newPlayerName, setNewPlayerName] = useState('');
      const [newPlayerRating, setNewPlayerRating] = useState('');
      const [newPlayerUrl, setNewPlayerUrl] = useState('');
      const [newCourtName, setNewCourtName] = useState('');

      // Persist states
      useEffect(() => {
        localStorage.setItem('standalone_pb_players_v2', JSON.stringify(players));
      }, [players]);

      useEffect(() => {
        localStorage.setItem('standalone_pb_matches_v2', JSON.stringify(matches));
      }, [matches]);

      useEffect(() => {
        localStorage.setItem('standalone_pb_courts_v2', JSON.stringify(courts));
      }, [courts]);

      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      });

      // Stats and calculations
      const leaderboardEntries = useMemo(() => {
        return getLeaderboard(players, matches);
      }, [players, matches]);

      const activePlayersCount = useMemo(() => {
        return players.filter(p => p.active).length;
      }, [players]);

      const activeCourtsCount = useMemo(() => {
        return courts.filter(c => c.isActive).length;
      }, [courts]);

      // --- Actions ---
      const handleAddPlayer = (e) => {
        e.preventDefault();
        const pName = newPlayerName.trim();
        if (!pName) return;

        const newPlayer = {
          id: 'p-' + Math.random().toString(36).substr(2, 9),
          name: pName,
          duprRating: newPlayerRating !== '' ? parseFloat(newPlayerRating) : undefined,
          duprUrl: newPlayerUrl.trim() || undefined,
          group: 'ทั่วไป',
          active: true,
          gamesPlayed: 0,
          joinedAt: Date.now()
        };

        setPlayers([...players, newPlayer]);
        setNewPlayerName('');
        setNewPlayerUrl('');
        setNewPlayerRating('');
      };

      const togglePlayerActive = (id) => {
        setPlayers(players.map(p => p.id === id ? { ...p, active: !p.active } : p));
      };

      const handleRemovePlayer = (id) => {
        if (confirm('คุณต้องการยืนยันลบชื่อผู้เล่นคนนี้หรือไม่? ผลคะแนนสะสมจะถูกคำนวณใหม่')) {
          setPlayers(players.filter(p => p.id !== id));
        }
      };

      const handleClearAllPlayers = () => {
        if (confirm('คุณต้องการยืนยันการลบชื่อผู้แข่งขันที่มีอยู่ทั้งหมดพร้อมกันในระบบใช่หรือไม่? ประวัติการแข่งสำหรับผู้เล่นเหล่านั้นทั้งหมดเฉพาเครื่องนี้ระบบจะรีเซ็ตลบใหม่')) {
          if (confirm('โปรดยืนยันขั้นเด็ดขาดลบรายชื่อผู้เล่นทั้งหมด?')) {
            setPlayers([]);
          }
        }
      };

      const handleAddCourt = (e) => {
        e.preventDefault();
        const cName = newCourtName.trim();
        if (!cName) return;

        const newCourt = {
          id: 'court-' + Math.random().toString(36).substr(2, 5),
          name: cName,
          isActive: true
        };

        setCourts([...courts, newCourt]);
        setNewCourtName('');
      };

      const toggleCourtActive = (id) => {
        const updated = courts.map(c => c.id === id ? { ...c, isActive: !c.isActive } : c);
        setCourts(updated);
        // Reschedule pending matches based on updated courts dynamically
        const rescheduled = scheduleAvailableMatches(matches, updated, players);
        setMatches(rescheduled);
      };

      const handleRemoveCourt = (id) => {
        if (confirm('ลบสนามแข่งขันออกจากระบบใช่หรือไม่?')) {
          const updated = courts.filter(c => c.id !== id);
          setCourts(updated);
          const rescheduled = scheduleAvailableMatches(matches, updated, players);
          setMatches(rescheduled);
        }
      };

      const handleGenerateMatches = () => {
        const activeCount = players.filter(p => p.active).length;
        if (activeCount < 4) {
          alert('จำนวนผู้แข่งขันที่พร้อมเล่นมีไม่ครบ 4 คนขึ้นไป กรุณาเพิ่มผู้เล่นหรือติ๊กถูกหน้าชื่อผู้เล่นอย่างน้อย 4 คนขึ้นไป');
          return;
        }

        const generated = generateMatchPool(players, 'ทั่วไป');
        const scheduled = scheduleAvailableMatches(generated, courts, players);
        setMatches(scheduled);
        setActiveTab('scheduler');
      };

      const handleClearMatches = () => {
        if (confirm('ต้องการล้างตารางจับคู่คิวการนัดแข่งขันทั้งหมดในสโมสรเพื่อจัดตั้งใหม่ใช่หรือไม่? คะแนนทั้งหมดจะเริ่มรีเซ็ต')) {
          setMatches([]);
        }
      };

      const handleLogScore = (matchId, s1, s2) => {
        const score1 = parseInt(s1, 10);
        const score2 = parseInt(s2, 10);
        if (isNaN(score1) || isNaN(score2)) return;

        const updated = matches.map(m => {
          if (m.id === matchId) {
            return {
              ...m,
              score1,
              score2,
              played: true,
              status: 'completed',
              completedAt: Date.now()
            };
          }
          return m;
        });

        const rescheduled = scheduleAvailableMatches(updated, courts, players);
        setMatches(rescheduled);
      };

      const handleResetMatch = (matchId) => {
        const updated = matches.map(m => {
          if (m.id === matchId) {
            return {
              ...m,
              score1: null,
              score2: null,
              played: false,
              status: 'pending',
              courtId: null,
              courtName: null,
              scheduledAt: undefined,
              completedAt: undefined
            };
          }
          return m;
        });
        const rescheduled = scheduleAvailableMatches(updated, courts, players);
        setMatches(rescheduled);
      };

      const getPlayerName = (pId) => {
        const found = players.find(p => p.id === pId);
        if (!found) return 'ไม่มีชื่อผู้เล่น';
        return found.name;
      };

      const getPlayerDuprIdOrName = (pId) => {
        const found = players.find(p => p.id === pId);
        if (!found) return 'ไม่มีชื่อผู้เล่น';
        if (found.duprUrl) {
          const match = found.duprUrl.match(/user\/(\d+)/i) || found.duprUrl.match(/id\D*(\d+)/i) || found.duprUrl.match(/player\/(\d+)/i);
          return match ? match[1] : found.duprUrl;
        }
        return found.name;
      };

      // --- Export functionality inside Standalone Html ---
      const handleCsvExport = () => {
        const completed = matches.filter(m => m.played);
        if (completed.length === 0) {
          alert('ไม่มีแมตช์แข่งขันเสร็จสิ้นในการส่งออกข้อมูล');
          return;
        }

        const headers = [
          'Match Date', 'Team 1 Player 1', 'Team 1 Player 2', 'Team 2 Player 1', 'Team 2 Player 2', 'Score Team 1', 'Score Team 2', 'Court'
        ];
        const rows = [headers.join(',')];

        completed.forEach(m => {
          rows.push([
            new Date(m.completedAt || Date.now()).toLocaleDateString('th-TH'),
            `"${getPlayerDuprIdOrName(m.player1Id)}"`,
            `"${getPlayerDuprIdOrName(m.player2Id)}"`,
            `"${getPlayerDuprIdOrName(m.opponent1Id)}"`,
            `"${getPlayerDuprIdOrName(m.opponent2Id)}"`,
            m.score1,
            m.score2,
            `"${m.courtName || 'คอร์ท'}"`
          ].join(','));
        });

        const csvContent = '\uFEFF' + rows.join('\n');
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `Match_Results_Export.csv`;
        link.click();
      };

      return (
        <div className="min-h-screen flex flex-col bg-[#f8fafc]">
          
          {hasSavedData && (
            <div className="bg-amber-50 border-b border-amber-200 text-amber-850 px-6 py-3 text-xs flex flex-col sm:flex-row sm:items-center justify-between gap-3 font-medium antialiased">
              <div className="flex items-center gap-2">
                <i data-lucide="info" className="w-4 h-4 text-amber-600 flex-shrink-0 animate-pulse"></i>
                <span>
                  <strong>ตรวจพบข้อมูลบันทึกในเครื่องหลักนี้:</strong> ระบบกำลังถอดข้อมูลเดิมที่เก็บไว้ในเว็บบราวเซอร์มาแสดงผล หากผู้ควบคุมอยากเริ่มต้นเก็บข้อมูลชุดใหม่ที่ระบุจากโปรแกรมตั้งต้นชิ้นนี้ กรุณากดปุ่มล้างและซิงก์ข้อมูล
                </span>
              </div>
              <button
                onClick={handleLoadInitialData}
                className="px-4 py-1.5 bg-amber-600 hover:bg-amber-700 text-white font-bold rounded-xl text-[10px] cursor-pointer transition-all whitespace-nowrap shadow-xs"
              >
                โหลดใหม่จากไฟล์เริ่มต้น
              </button>
            </div>
          )}
          
          {/* Main Top Header */}
          <header className="bg-slate-900 text-white shadow-md border-b border-slate-800">
            <div className="max-w-7xl mx-auto px-6 py-4.5 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center gap-3">
                <div className="p-2.5 bg-gradient-to-tr from-indigo-600 to-teal-500 rounded-xl shadow-lg shadow-indigo-500/10">
                  <i data-lucide="trophy" className="w-6 h-6 text-yellow-300"></i>
                </div>
                <div>
                  <h1 className="text-xl font-black tracking-tight flex items-center gap-1.5 font-sans">
                    PRO PICKLEBALL Matchmaker
                    <span className="text-[10px] bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 font-bold px-2 py-0.5 rounded-md uppercase font-mono">STANDALONE (รุ่นพกพา)</span>
                  </h1>
                  <p className="text-xs text-slate-400 font-medium">ระบบคำนวณจับคู่วนแบบพบกันหมด • ป้องกันผู้เล่นซ้ำในรอบเดียวกัน</p>
                </div>
              </div>

              {/* HIGHLIGHTED GENERATOR TRIGGER BUTTON - VERY CLEAR! */}
              <button 
                onClick={handleGenerateMatches}
                className="px-6 py-3 bg-gradient-to-r from-emerald-500 via-teal-500 to-indigo-600 text-white rounded-xl text-xs sm:text-sm font-black shadow-lg shadow-indigo-200 transition-all flex items-center gap-2 cursor-pointer hover:scale-105 active:scale-95 border-2 border-white ring-4 ring-indigo-50 animate-bounce-subtle"
              >
                <i data-lucide="sparkles" className="w-4 h-4 text-white animate-spin-slow"></i>
                {matches.length === 0 ? 'สุ่มจับคู่แมตช์พบกันหมดใหม่' : 'สร้างคำนวณสุ่มจับคู่ใหม่'}
              </button>
            </div>
          </header>

          {/* Tab Selection Navigation Bar */}
          <nav className="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-xs">
            <div className="max-w-7xl mx-auto px-6 flex overflow-x-auto gap-2 py-2.5">
              <button
                onClick={() => setActiveTab('scheduler')}
                className={'flex items-center gap-2 py-2 px-4 text-xs font-bold rounded-xl transition-all ' + (activeTab === 'scheduler' ? 'bg-indigo-600 text-white shadow-sm' : 'text-slate-650 hover:bg-slate-50')}
              >
                <i data-lucide="calendar" className="w-4 h-4"></i>
                ตารางแข่งขันและรายงานผล ({matches.length})
              </button>

              <button
                onClick={() => setActiveTab('players')}
                className={'flex items-center gap-2 py-2 px-4 text-xs font-bold rounded-xl transition-all ' + (activeTab === 'players' ? 'bg-indigo-600 text-white shadow-sm' : 'text-slate-650 hover:bg-slate-50')}
              >
                <i data-lucide="users" className="w-4 h-4"></i>
                จัดการรายชื่อผู้เล่น ({players.length} คน • พร้อม {activePlayersCount} คน)
              </button>

              <button
                onClick={() => setActiveTab('courts')}
                className={'flex items-center gap-2 py-2 px-4 text-xs font-bold rounded-xl transition-all ' + (activeTab === 'courts' ? 'bg-indigo-600 text-white shadow-sm' : 'text-slate-650 hover:bg-slate-50')}
              >
                <i data-lucide="layout" className="w-4 h-4"></i>
                ตั้งค่าสนามแข่งขัน ({courts.length} สนาม)
              </button>

              <button
                onClick={() => setActiveTab('leaderboard')}
                className={'flex items-center gap-2 py-2 px-4 text-xs font-bold rounded-xl transition-all ' + (activeTab === 'leaderboard' ? 'bg-indigo-600 text-white shadow-sm' : 'text-slate-650 hover:bg-slate-50')}
              >
                <i data-lucide="award" className="w-4 h-4"></i>
                ตารางผลคะแนนอันดับเดี่ยว
              </button>
            </div>
          </nav>

          {/* Main Space Layout */}
          <main className="flex-1 max-w-7xl w-full mx-auto px-6 py-6 space-y-6">

            {/* TAB CONTENT: Scheduler and Games */}
            {activeTab === 'scheduler' && (
              <div className="space-y-6">
                
                {/* Visual statistics stats overview */}
                <div className="grid grid-cols-1 sm:grid-cols-4 gap-4">
                  <div className="bg-white p-4 rounded-xl border border-slate-205 shadow-xs">
                    <span className="block text-[10px] uppercase font-bold tracking-wider text-slate-400">แมตช์เล่นเสร็จสิ้น</span>
                    <span className="text-xl font-black text-slate-800 font-mono">{matches.filter(m => m.played).length} / {matches.length} แมตช์</span>
                  </div>
                  <div className="bg-white p-4 rounded-xl border border-slate-205 shadow-xs">
                    <span className="block text-[10px] uppercase font-bold tracking-wider text-slate-400">สนามที่เปิดพร้อมบริการ</span>
                    <span className="text-xl font-black text-slate-800 font-mono">{activeCourtsCount} คอร์ทสนาม</span>
                  </div>
                  <div className="bg-white p-4 rounded-xl border border-slate-205 shadow-xs">
                    <span className="block text-[10px] uppercase font-bold tracking-wider text-slate-400">สิทธิ์ผู้เล่นหมุนเวียน</span>
                    <span className="text-xl font-black text-slate-800 font-mono">{activePlayersCount} คนพร้อมใช้งาน</span>
                  </div>
                  <div className="bg-white p-4 rounded-xl border border-slate-205 shadow-xs flex items-center justify-between">
                    <div>
                      <span className="block text-[10px] uppercase font-bold tracking-wider text-indigo-400">ตารางออมทรัพย์ออฟไลน์</span>
                      <span className="text-xs font-bold text-slate-650">จัดข้อมูลความปลอดภัยภายในเครื่อง</span>
                    </div>
                    <button 
                      onClick={handleCsvExport}
                      className="p-2 bg-slate-50 border border-slate-200 hover:bg-slate-100 rounded-lg text-slate-600"
                      title="ส่งออก CSV"
                    >
                      <i data-lucide="download" className="w-4 h-4"></i>
                    </button>
                  </div>
                </div>

                <div className="bg-white rounded-2xl border border-slate-200 p-6 shadow-xs space-y-5">
                  <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border-b border-slate-100 pb-4">
                    <div>
                      <h3 className="font-extrabold text-slate-800 text-sm">ลิสต์การจับตานัดแข่ง (พบกันหมด)</h3>
                      <p className="text-[11px] text-slate-400">ผู้เล่นได้รับสิทธิ์เฉลี่ยเท่าเทียม ไม่สามารถชนสนามเล่นพร้อมกันในรอบเดียวกันได้</p>
                    </div>
                    <div className="flex gap-2">
                      <button
                        onClick={handleClearMatches}
                        className="py-2.5 px-4 bg-rose-50 border border-rose-200 text-rose-600 hover:bg-rose-100 rounded-xl text-xs font-bold transition-all cursor-pointer"
                      >
                        ล้างรีเซ็ตตารางการแข่งขันทั้งหมด
                      </button>
                    </div>
                  </div>

                  {matches.length === 0 ? (
                    <div className="text-center py-12 space-y-3.5">
                      <div className="p-3 bg-indigo-50/50 rounded-full w-fit mx-auto text-indigo-600">
                        <i data-lucide="info" className="w-5 h-5"></i>
                      </div>
                      <div className="space-y-1">
                        <h4 className="font-bold text-slate-700 text-xs">ตารางแข่งขันว่างเปล่า</h4>
                        <p className="text-[11px] text-slate-400 max-w-sm mx-auto">กรุณากดปุ่มสีเขียว <span className="font-bold text-indigo-600">"สุ่มจับคู่แมตช์พบกันหมดใหม่"</span> ด้านขวาบนเพื่อประมวลผลจัดตารางเล่นให้ทันที</p>
                      </div>
                    </div>
                  ) : (
                    <div className="space-y-3">
                      {matches.map((m, index) => {
                        const isScoreLogged = m.played;
                        return (
                          <div 
                            key={m.id} 
                            className={`p-4 rounded-2xl flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 border transition-all ${
                              isScoreLogged 
                                ? 'bg-emerald-50/15 border-emerald-100/70 shadow-2xs' 
                                : m.status === 'active'
                                ? 'bg-amber-50/15 border-amber-200/50 shadow-2xs'
                                : 'bg-white border-slate-200 shadow-2xs hover:bg-slate-50/30'
                            }`}
                          >
                            
                            <div className="flex flex-wrap items-center gap-3.5 w-full lg:w-auto">
                              <span className={`font-mono text-[10px] font-extrabold px-2 py-1 rounded-md ${
                                isScoreLogged 
                                  ? 'bg-emerald-100/85 text-emerald-800 border border-emerald-200/30' 
                                  : m.status === 'active'
                                  ? 'bg-amber-100/85 text-amber-800 border border-amber-200/30'
                                  : 'bg-slate-100 text-slate-500'
                              }`}>ROUND {m.round}</span>
                              
                              <div className={`px-4 py-3 rounded-xl border flex items-center gap-4 text-xs font-semibold w-full sm:w-auto ${
                                isScoreLogged 
                                  ? 'bg-emerald-50/30 border-emerald-100 text-slate-700' 
                                  : m.status === 'active'
                                  ? 'bg-amber-50/30 border-amber-100 text-slate-800'
                                  : 'bg-slate-55 px-4 py-3 rounded-xl border border-slate-150 text-slate-700'
                              }`}>
                                <div className="text-indigo-950 font-extrabold">
                                  {getPlayerName(m.player1Id)} & {getPlayerName(m.player2Id)}
                                </div>
                                <span className="text-slate-400 text-[10px] uppercase font-mono tracking-widest font-extrabold text-center block">VS</span>
                                <div className="text-slate-800 font-extrabold">
                                  {getPlayerName(m.opponent1Id)} & {getPlayerName(m.opponent2Id)}
                                </div>
                              </div>
                            </div>

                            {/* Court metadata */}
                            <div className="flex flex-wrap items-center gap-3 w-full lg:w-auto justify-between lg:justify-end">
                              <div>
                                {m.status === 'active' && m.courtName && (
                                  <span className="px-2.5 py-1.5 bg-amber-50 text-amber-700 border border-amber-200 rounded-lg text-[10px] font-bold flex items-center gap-1">
                                    🎾 กำลังแข่งขัน: {m.courtName}
                                  </span>
                                )}
                              </div>

                              {isScoreLogged ? (
                                <div className="flex items-center gap-3">
                                  <span className="text-[10px] font-bold text-emerald-700 bg-emerald-100/60 border border-emerald-200/30 px-2.5 py-1 rounded-lg flex items-center gap-1">
                                    <i data-lucide="check-circle" className="w-3.5 h-3.5"></i> จบเกมส์แล้ว
                                  </span>
                                  <span className="text-emerald-800 font-mono font-black text-xs bg-emerald-100 border border-emerald-200/70 py-1.5 px-4 rounded-xl">
                                    {m.score1} - {m.score2}
                                  </span>
                                  <button
                                    onClick={() => handleResetMatch(m.id)}
                                    className="text-[10px] font-bold text-slate-400 hover:text-indigo-650 cursor-pointer transition-colors"
                                  >
                                    แก้ไขสกอร์ใหม่
                                  </button>
                                </div>
                              ) : (
                                <form
                                  onSubmit={(e) => {
                                    e.preventDefault();
                                    const s1 = e.target.s1.value;
                                    const s2 = e.target.s2.value;
                                    handleLogScore(m.id, s1, s2);
                                  }}
                                  className="flex items-center gap-2"
                                >
                                  <input
                                    type="number"
                                    name="s1"
                                    placeholder="ทีม1"
                                    required
                                    min="0"
                                    className="w-14 p-1.5 border border-slate-200 rounded text-center text-xs outline-none"
                                  />
                                  <span className="text-slate-300 font-bold">-</span>
                                  <input
                                    type="number"
                                    name="s2"
                                    placeholder="ทีม2"
                                    required
                                    min="0"
                                    className="w-14 p-1.5 border border-slate-200 rounded text-center text-xs outline-none"
                                  />
                                  <button
                                    type="submit"
                                    className="py-1.5 px-3 bg-slate-800 hover:bg-black text-white text-[11px] rounded-lg cursor-pointer font-bold"
                                  >
                                    บันทึกสกอร์
                                  </button>
                                </form>
                              )}
                            </div>

                          </div>
                        );
                      })}
                    </div>
                  )}

                </div>
              </div>
            )}

            {/* TAB CONTENT: Manage Players */}
            {activeTab === 'players' && (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                
                {/* Form to add player */}
                <div className="bg-white rounded-2xl border border-slate-200 p-5 shadow-xs h-fit space-y-4">
                  <h3 className="font-extrabold text-slate-855 text-sm">ลงทะเบียนเพิ่มผู้แข่งขันใหม่</h3>
                  
                  <form onSubmit={handleAddPlayer} className="space-y-3.5 text-xs">
                    <div className="space-y-1">
                      <label className="text-slate-500 font-bold block">ชื่อ-นามสกุล / นามแฝงผู้เล่น</label>
                      <input
                        type="text"
                        placeholder="เช่น สมภพ สมดี"
                        value={newPlayerName}
                        onChange={e => setNewPlayerName(e.target.value)}
                        required
                        className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none text-slate-800"
                      />
                    </div>

                    <div className="space-y-1">
                      <label className="text-slate-500 font-bold block">DUPR Rating คะแนน (ปล่อยว่างได้)</label>
                      <input
                        type="number"
                        step="0.01"
                        placeholder="ระบุตัวเลข หรือปล่อยว่าง"
                        value={newPlayerRating}
                        onChange={e => setNewPlayerRating(e.target.value)}
                        className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none text-slate-800 font-mono"
                      />
                    </div>

                    <div className="space-y-1">
                      <label className="text-slate-500 font-bold block">ลิ้งก์บัญชี DUPR / ID (ปล่อยว่างได้)</label>
                      <input
                        type="text"
                        placeholder="ใส่ตัวเลข ID ลิ้งก์ หรือปล่อยว่าง"
                        value={newPlayerUrl}
                        onChange={e => setNewPlayerUrl(e.target.value)}
                        className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none text-slate-800 font-mono"
                      />
                    </div>

                    <button
                      type="submit"
                      className="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-lg cursor-pointer transition text-xs"
                    >
                      รักษาสิทธิ์ เพิ่มผู้เล่นลงพูลของสโมสร
                    </button>
                  </form>
                </div>

                {/* Table list of players */}
                <div className="bg-white rounded-2xl border border-slate-200 p-5 shadow-xs lg:col-span-2 space-y-4">
                  <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 border-b border-slate-100 pb-3">
                    <div>
                      <h3 className="font-extrabold text-slate-800 text-sm">ทำเนียบสมาชิกในระบบทั้งหมด ({players.length} คน)</h3>
                      <p className="text-[10px] text-slate-404">คุณสามารถติ๊กปิดเปิดสิทธิ์การพักเล่นชั่วคราว เพื่อถอนชื่อออกจากรอบสุ่มถัดไปได้เรียลไทม์</p>
                    </div>
                    {players.length > 0 && (
                      <button
                        onClick={handleClearAllPlayers}
                        className="py-1.5 px-3 bg-rose-50 border border-rose-200 text-rose-600 hover:bg-rose-100 rounded-lg text-[10px] font-bold transition-all cursor-pointer flex items-center gap-1"
                      >
                        <i data-lucide="trash-2" className="w-3 h-3 text-rose-500"></i>
                        ล้างรายชื่อผู้เล่นทั้งหมด
                      </button>
                    )}
                  </div>

                  <div className="overflow-x-auto text-xs">
                    <table className="w-full text-left">
                      <thead className="bg-slate-50 text-slate-400 font-bold">
                        <tr>
                          <th className="py-2.5 px-3">ชื่อ-นามสกุล</th>
                          <th className="py-2.5 px-3">DUPR Rating</th>
                          <th className="py-2.5 px-3 text-center">สิทธิ์ความพร้อม</th>
                          <th className="py-2.5 px-3 text-right">เครื่องมือ</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100 font-medium">
                        {players.length === 0 ? (
                          <tr>
                            <td colSpan="4" className="py-8 text-center text-slate-400">ระบบว่างยังไม่มีผู้เล่นเพิ่มคิวในขณะนี้</td>
                          </tr>
                        ) : (
                          players.map(p => (
                            <tr key={p.id}>
                              <td className="py-3 px-3">
                                <p className="font-semibold text-slate-805">{p.name}</p>
                                {p.duprUrl && (
                                  <a href={p.duprUrl.startsWith('http://') || p.duprUrl.startsWith('https://') ? p.duprUrl : `https://mydupr.com/player/${p.duprUrl}`} target="_blank" rel="noopener noreferrer" className="text-[9px] text-indigo-500 hover:underline font-mono">DUPR ID: {p.duprUrl}</a>
                                )}
                              </td>
                              <td className="py-3 px-3 font-mono font-bold text-slate-600">
                                {p.duprRating ? p.duprRating.toFixed(2) : '-'}
                              </td>
                              <td className="py-3 px-3 text-center">
                                <button
                                  onClick={() => togglePlayerActive(p.id)}
                                  className={'px-3 py-1 rounded-full text-[10px] font-bold transition-all cursor-pointer ' + (p.active ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-400')}
                                >
                                  {p.active ? 'พร้อมลงแข่ง' : 'ขอพักเบรก'}
                                </button>
                              </td>
                              <td className="py-3 px-3 text-right">
                                <button
                                  onClick={() => handleRemovePlayer(p.id)}
                                  className="text-red-500 hover:text-red-700 text-[11px] font-bold cursor-pointer"
                                >
                                  ลบ
                                </button>
                              </td>
                            </tr>
                          ))
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>

              </div>
            )}

            {/* TAB CONTENT: Configure Courts */}
            {activeTab === 'courts' && (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                
                {/* Court addition form */}
                <div className="bg-white rounded-2xl border border-slate-200 p-5 shadow-xs h-fit space-y-4">
                  <h3 className="font-extrabold text-slate-850 text-sm">เพิ่มสนามแข่งขันใหม่</h3>
                  <form onSubmit={handleAddCourt} className="space-y-3.5 text-xs">
                    <div className="space-y-1">
                      <label className="text-slate-500 font-bold block">ชื่อคอร์ท / หมายเลขสนาม</label>
                      <input
                        type="text"
                        placeholder="เช่น คอร์ทพิกเกิลเบิร์ด A"
                        value={newCourtName}
                        onChange={e => setNewCourtName(e.target.value)}
                        required
                        className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none text-slate-800"
                      />
                    </div>
                    <button
                      type="submit"
                      className="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-lg cursor-pointer transition text-xs"
                    >
                      ยืนยันติดตั้งสนาม
                    </button>
                  </form>
                </div>

                {/* Courts display table */}
                <div className="bg-white rounded-2xl border border-slate-200 p-5 shadow-xs lg:col-span-2 space-y-4">
                  <div>
                    <h3 className="font-extrabold text-slate-800 text-sm">ทำเนียบสนามแข่งขันสำหรับจัดตารอบ</h3>
                    <p className="text-[10px] text-slate-400">เมื่อมีสนามจำนวนมาก ระบบจะดึงเอาแมตช์พบกันหมดที่ไม่มีผู้เล่นชนกันไปลงคอร์ทพร้อมกันเพื่อความรวดเร็วสูงสุด</p>
                  </div>

                  <div className="overflow-x-auto text-xs">
                    <table className="w-full text-left">
                      <thead className="bg-slate-50 text-slate-400 font-bold">
                        <tr>
                          <th className="py-2.5 px-3">ชื่อสนาม / คอร์ท</th>
                          <th className="py-2.5 px-3 text-center">สถานะความพร้อมสนาม</th>
                          <th className="py-2.5 px-3 text-right">เครื่องมือ</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100 font-medium">
                        {courts.length === 0 ? (
                          <tr>
                            <td colSpan="3" className="py-8 text-center text-slate-400">ยังไม่มีการตั้งค่าระบุสนามแข่งขันขณะนี้</td>
                          </tr>
                        ) : (
                          courts.map(c => (
                            <tr key={c.id}>
                              <td className="py-3 px-3 font-semibold text-slate-800">{c.name}</td>
                              <td className="py-3 px-3 text-center">
                                <button
                                  onClick={() => toggleCourtActive(c.id)}
                                  className={'px-3 py-1 rounded-full text-[10px] font-bold transition-all cursor-pointer ' + (c.isActive ? 'bg-indigo-100 text-indigo-700' : 'bg-slate-100 text-slate-400')}
                                >
                                  {c.isActive ? 'เปิดให้บริการปกติ' : 'ปิดซ่อมแซมชั่วคราว'}
                                </button>
                              </td>
                              <td className="py-3 px-3 text-right">
                                <button
                                  onClick={() => handleRemoveCourt(c.id)}
                                  className="text-red-500 hover:text-red-700 text-[11px] font-bold cursor-pointer"
                                >
                                  ลบสนาม
                                </button>
                              </td>
                            </tr>
                          ))
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>

              </div>
            )}

            {/* TAB CONTENT: Leaderboard */}
            {activeTab === 'leaderboard' && (
              <div className="bg-white rounded-2xl border border-slate-200 p-6 shadow-xs space-y-5">
                <div className="flex justify-between items-center border-b border-slate-100 pb-4">
                  <div>
                    <h3 className="font-extrabold text-slate-800 text-base">ตารางอันดับเดี่ยวคะแนนสะสม (สโมสร)</h3>
                    <p className="text-xs text-slate-400">เรียงลำดับตามจำนวนแมตช์ชนะ, ค่าผลต่างข้อได้เสียสะสม และรวมคะแนนดิฟที่ทำได้ตามลำดับ</p>
                  </div>
                </div>

                <div className="overflow-x-auto text-xs">
                  <table className="w-full text-left">
                    <thead className="bg-slate-50 text-slate-400 font-bold">
                      <tr>
                        <th className="py-2.5 px-3">อันดับ</th>
                        <th className="py-2.5 px-3">รายชื่อสมาชิก</th>
                        <th className="py-2.5 px-3">สถิติ DUPR</th>
                        <th className="py-2.5 px-3 text-center font-mono">แข่งรวม</th>
                        <th className="py-2.5 px-3 text-center font-mono">ชนะ</th>
                        <th className="py-2.5 px-3 text-center font-mono">แพ้</th>
                        <th className="py-2.5 px-3 text-center font-mono">ผลต่างแต้มบวก</th>
                        <th className="py-2.5 px-3 text-center font-mono">อัตราชนะ (Ratio)</th>
                        <th className="py-2.5 px-3 text-right">Streak</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100 font-medium">
                      {leaderboardEntries.length === 0 ? (
                        <tr>
                          <td colSpan="9" className="py-12 text-center text-slate-400">ไม่มีข้อมูลแสดงอันดับในระบบ เริ่มต้นจัดการแมตช์และบันทึกคะแนนเพื่อลุยสะสมบอร์ด</td>
                        </tr>
                      ) : (
                        leaderboardEntries.map((item, index) => (
                          <tr key={item.playerId} className="hover:bg-slate-50/50">
                            <td className="py-3 px-3 font-bold text-indigo-700">#{index + 1}</td>
                            <td className="py-3 px-3 font-semibold text-slate-800">{item.name}</td>
                            <td className="py-3 px-3 font-mono font-bold text-slate-500">{item.duprRating ? item.duprRating.toFixed(2) : '-'}</td>
                            <td className="py-3 px-3 text-center font-mono text-slate-700">{item.gamesPlayed}</td>
                            <td className="py-3 px-3 text-center text-green-600 font-mono font-bold">{item.wins}</td>
                            <td className="py-3 px-3 text-center text-rose-500 font-mono">{item.losses}</td>
                            <td className="py-3 px-3 text-center font-mono font-bold">
                              {item.pointDifferential >= 0 ? '+' : ''}{item.pointDifferential}
                            </td>
                            <td className="py-3 px-3 text-center font-mono font-bold text-slate-650">{(item.winRatio * 100).toFixed(0)}%</td>
                            <td className="py-3 px-3 text-right font-mono">
                              <span className={'px-2 py-0.5 rounded text-[10px] font-bold ' + (item.streak > 0 ? 'bg-green-100 text-green-700' : item.streak < 0 ? 'bg-red-100 text-red-700' : 'bg-slate-100 text-slate-400')}>
                                {item.streak > 0 ? 'W' + item.streak : item.streak < 0 ? 'L' + Math.abs(item.streak) : '-'}
                              </span>
                            </td>
                          </tr>
                        ))
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

          </main>

          {/* Standalone Footer */}
          <footer className="bg-slate-900 border-t border-slate-800 py-6 text-center text-[11px] text-slate-500 mt-auto">
            <p className="font-mono">© 2026 PRO PICKLEBALL MATCHMAKER • COMPACT LOCAL STORAGE DATABASE ENGINE.</p>
            <p className="mt-0.5">พฒนาขึ้นสำหรับการส่งออกหน้าเว็บเดี่ยว เพื่อพกพาไปเล่นออฟไลน์ตามยิมและชมรมของท่านอย่างสมบูรณ์</p>
          </footer>

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
